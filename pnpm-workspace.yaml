packages:
  - .

# Supply-chain hardening (https://pnpm.io/settings).
# Block transitive dependencies resolved from non-registry sources (git/tarball URLs);
# a legitimate dependency should always come from the registry.
blockExoticSubdeps: true

# Refuse to install any package version published less than 2 days ago, so a freshly
# compromised release is not picked up before the community can flag it. The committed
# lockfile is verified against this on every install.
minimumReleaseAge: 2880

overrides:
  qs: 6.15.2
  # Force the transitive fast-uri (pulled by ajv, a dev/build-only dependency) to the release that
  # fixes CVE-2026-16221 / GHSA-v2hh-gcrm-f6hx (host confusion via a literal backslash authority
  # delimiter). ajv declares a 3.x range, so this stays on that line - a patch over the 3.1.3 it
  # otherwise resolves. Never shipped in the app (dev scope), but it clears the open Dependabot alert.
  fast-uri: 3.1.4
