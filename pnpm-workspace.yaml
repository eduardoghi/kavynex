packages:
  - .

# Supply-chain hardening (https://pnpm.io/settings).
# Block transitive dependencies resolved from non-registry sources (git/tarball URLs);
# a legitimate dependency should always come from the registry.
blockExoticSubdeps: true

# Refuse to install any package version published less than 2 days ago, so a freshly
# compromised release is not picked up before the community can flag it. The committed
# lockfile is verified against this on every install.
minimumReleaseAge: 2880

overrides:
  qs: 6.15.2
