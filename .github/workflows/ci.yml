name: ci

on:
    push:
        branches: [main]
    pull_request:

# CI only needs to read the repository; keep the token minimal regardless of the
# repository/organization default.
permissions:
    contents: read

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    frontend:
        name: Frontend
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Setup pnpm
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
              with:
                  version: 10

            - name: Setup Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: lts/*
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint
              run: pnpm lint

            - name: Run tests
              run: pnpm test:run

            - name: Build frontend
              run: pnpm build

    rust:
        name: Rust (${{ matrix.platform }})
        strategy:
            fail-fast: false
            matrix:
                # macOS is included because the release ships macOS binaries; without it,
                # platform-specific bugs (path semantics, canonicalization) would only
                # surface at release time.
                platform: [ubuntu-22.04, windows-latest, macos-latest]
        runs-on: ${{ matrix.platform }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-06-30)
              with:
                  components: rustfmt, clippy

            - name: Install Linux dependencies
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            - name: Cache Rust build
              uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
              with:
                  workspaces: src-tauri

            - name: Check formatting
              run: cargo fmt --manifest-path src-tauri/Cargo.toml --all --check

            - name: Clippy
              run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

            - name: Run tests
              run: cargo test --manifest-path src-tauri/Cargo.toml

            - name: Verify generated TS bindings are up to date
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  cargo test --manifest-path src-tauri/Cargo.toml --lib export_bindings
                  git diff --exit-code -- src/types/generated

    audit:
        name: Cargo audit
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-06-30)

            - name: Install cargo-audit
              run: cargo install cargo-audit --locked

            # RUSTSEC advisories are not covered by pnpm audit; this closes that gap for the
            # Rust dependency tree.
            - name: Audit Rust dependencies
              run: cargo audit --file src-tauri/Cargo.lock
