name: ci

on:
    push:
        branches: [main]
    pull_request:

# CI only needs to read the repository; keep the token minimal regardless of the
# repository/organization default.
permissions:
    contents: read

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    frontend:
        name: Frontend
        # Pinned rather than `ubuntu-latest` for the same reason as the rust job below: `-latest`
        # silently moves to a new OS major (the 2026-07-14 run already saw it happen for macOS).
        # This job ships nothing, but pinning keeps its toolchain from shifting without a deliberate
        # bump - the same rule the whole repo follows.
        runs-on: ubuntu-26.04
        # Same reasoning as the rust job below: never run toward the 6h default.
        timeout-minutes: 30
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            # No version input: the pnpm version comes from package.json's packageManager
            # field, so CI and local Corepack install the same pinned pnpm.
            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

            - name: Setup Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  # Pinned to the Node major @types/node targets (26), so the code is
                  # type-checked against the same runtime CI uses. Bump both together.
                  node-version: 26.5.0
                  cache: pnpm

            # Catch a version bumped in only some of package.json/tauri.conf.json/Cargo.toml
            # here, on every push/PR, instead of only at release time.
            - name: Verify version consistency
              run: node scripts/verify-release-version.js

            # Catch a Node version bumped in .nvmrc but not the workflows (or vice versa) here,
            # rather than silently building/testing against a different runtime than local dev.
            - name: Verify Node version consistency
              run: node scripts/verify-node-version.js

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            # Fail only on high/critical advisories so a low-severity transitive
            # finding does not block all CI; RUSTSEC advisories are covered separately
            # by the cargo-audit job.
            #
            # Not `pnpm audit`: npm retired the legacy audit endpoints on 2026-07-15 and every
            # pnpm release (10.34.5 and 11.13.0 both verified) still calls them, so that command
            # now fails with HTTP 410 whether or not an advisory exists. The script queries
            # osv.dev - the same GitHub Advisory data, via the source osv-scanner wraps - and
            # keeps the same high/critical bar. See scripts/check-js-advisories.js.
            - name: Audit production JS dependencies
              run: pnpm run advisories:check

            # `--prod` above skips devDependencies (the build/test toolchain, which still
            # runs arbitrary code during install/build). Scan them too, but non-blocking:
            # a dev-only advisory should surface in the logs without gating every PR, since
            # it never ships in a release artifact.
            - name: Audit dev JS dependencies (non-blocking)
              continue-on-error: true
              run: pnpm run advisories:check --dev

            # cargo-deny has enforced a license allow-list on the Rust side since it landed
            # (src-tauri/deny.toml); the npm side only had pnpm audit, which reports security
            # advisories and says nothing about licensing. For an MIT-licensed public project
            # that asymmetry is the gap a copyleft transitive would slip through - the more so
            # now that Dependabot groups routine bumps into a single PR. Gated rather than
            # informational because the tree was measured first: 94 production packages, 7
            # distinct licenses, every one already permissive.
            - name: Check production JS licenses
              run: pnpm licenses:check

            - name: Lint
              run: pnpm lint

            # Runs the full suite with coverage so the thresholds in vitest.config.ts are
            # enforced here (a large coverage regression fails CI). Mutation testing
            # (pnpm test:mutation) stays the higher-signal, manually-run quality gate.
            - name: Run tests
              run: pnpm test:coverage

            - name: Build frontend
              run: pnpm build

    frontend-tests-cross-platform:
        name: Frontend tests (${{ matrix.platform }})
        # The `frontend` job above runs the full suite (lint/test/build/audit) on Ubuntu only. The
        # test suite is jsdom-based but not fully platform-independent - date formatting varies with
        # the runner's ICU (see the U+202F handling in media-utils.test.ts) - so a Windows/macOS-only
        # regression would otherwise stay invisible until a release build exercised it, failing
        # expensively partway through a multi-platform signed build. Run just the tests on the other
        # two platforms here to catch it on a cheap PR check instead. Lint/build/audit are
        # platform-independent and stay Ubuntu-only.
        strategy:
            fail-fast: false
            matrix:
                platform: [windows-2025, macos-26]
        runs-on: ${{ matrix.platform }}
        timeout-minutes: 30
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

            - name: Setup Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version: 26.5.0
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run tests
              run: pnpm test:run

    rust:
        name: Rust (${{ matrix.platform }})
        strategy:
            fail-fast: false
            matrix:
                # macOS is included because the release ships macOS binaries; without it,
                # platform-specific bugs (path semantics, canonicalization) would only
                # surface at release time.
                # Pinned images rather than the `-latest` aliases, matching release.yml: `-latest`
                # silently moves to a new major OS (the 2026-07-14 run already resolved
                # `macos-latest` to macos-26-arm64), and CI is only worth anything here if it tests
                # on what the release actually builds on.
                platform: [ubuntu-26.04, windows-2025, macos-26]
        runs-on: ${{ matrix.platform }}
        # Never let a job run toward the 6h default: a hang fails in bounded time.
        timeout-minutes: 30
        # Trim debuginfo (and, on ubuntu below, link with lld): CI never needs full debuginfo, and
        # this keeps the cold ubuntu compile/link on the slow 2-vCPU runner fast. A panic still
        # prints file:line, so failures stay diagnosable.
        env:
            CARGO_PROFILE_DEV_DEBUG: "0"
            CARGO_PROFILE_TEST_DEBUG: "0"
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Install Rust toolchain
              # Pin the exact toolchain (keep in sync with rust-toolchain.toml) instead of pulling
              # whatever "stable" is at build time. rust-toolchain.toml already forces this version
              # at cargo time; pinning the action too keeps the pre-installed compiler deterministic
              # and avoids downloading a moving "stable" toolchain the build never uses.
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-06-30)
              with:
                  toolchain: 1.96.0
                  components: rustfmt, clippy

            # These apt packages are deliberately not version-pinned, unlike the toolchain/Node/image.
            # Exact apt pins on a GitHub-hosted image are brittle: the archive drops superseded
            # versions, so a pinned `pkg=version` starts failing the moment the image refreshes, for
            # a reason unrelated to this project. Leaving them free is bounded - they are Linux
            # WebKit/GTK dev headers built against and dynamically linked at runtime against the
            # user's own system libraries, never shipped in the bundle.
            - name: Install Linux dependencies
              if: matrix.platform == 'ubuntu-26.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf lld
                  # Link with lld instead of the slow default ld.bfd (Linux only; macOS/Windows
                  # already use fast linkers). Scoped to this job via $GITHUB_ENV.
                  echo "RUSTFLAGS=-C link-arg=-fuse-ld=lld" >> "$GITHUB_ENV"

            - name: Cache Rust build
              uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
              with:
                  workspaces: src-tauri
                  # Persist the cache even when a job fails, so a run after a red build stays warm
                  # instead of recompiling the whole tree from scratch.
                  cache-on-failure: "true"

            - name: Check formatting
              run: cargo fmt --manifest-path src-tauri/Cargo.toml --all --check

            - name: Clippy
              run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --locked -- -D warnings

            - name: Run tests
              run: cargo test --manifest-path src-tauri/Cargo.toml --locked

            - name: Verify generated TS bindings are up to date
              if: matrix.platform == 'ubuntu-26.04'
              run: |
                  cargo test --manifest-path src-tauri/Cargo.toml --locked --lib export_bindings
                  git diff --exit-code -- src/types/generated

    audit:
        name: Cargo audit and deny
        # Pinned like the rust job below; see its comment on why `-latest` is avoided repo-wide.
        runs-on: ubuntu-26.04
        timeout-minutes: 30
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Install Rust toolchain
              # Pin the exact toolchain (keep in sync with rust-toolchain.toml) instead of a
              # moving "stable".
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-06-30)
              with:
                  toolchain: 1.96.0

            # Pin the tool version (keep in sync with release.yml): an unpinned `cargo install`
            # builds whatever the latest release happens to be on the day CI runs, so the code
            # executing here is not the code this repository last reviewed, and a green run stops
            # being reproducible. Pinning costs nothing in security freshness - cargo-audit
            # downloads the RustSec advisory database at run time, so a pinned tool still checks
            # against today's advisories.
            - name: Install cargo-audit
              run: cargo install cargo-audit@0.22.2 --locked

            # RUSTSEC advisories are not covered by the JS advisory check above; this closes
            # that gap for the Rust dependency tree.
            #
            # `--deny unsound` because without it cargo audit exits 0 on one: the tree carries 18
            # warnings today, so a new unsound advisory would land in that pile and ship silently.
            # An unsound crate is a real defect (UB reachable from safe code), unlike the bulk of
            # those warnings, which are unmaintained notices.
            #
            # Not `--deny warnings`: it fails today on the GTK3 and unic-* crates, which are
            # unmaintained upstream and arrive transitively through tauri itself. Gating on
            # something this project cannot act on only trains everyone to ignore a red run.
            #
            # Not `--deny yanked` either, for the same reason and no other: `spin 0.9.8` is yanked
            # and comes in via sqlx-sqlite -> flume, so it is equally out of reach. Unlike an
            # advisory it has no RUSTSEC id, so it cannot be ignored one-by-one the way the line
            # below does - it is deny-all or nothing. Worth revisiting whenever sqlx moves.
            #
            # RUSTSEC-2024-0429 (glib unsound, via that same GTK3 tree) is ignored by name rather
            # than by omission: naming it is what makes a *new* unsound advisory fail the run
            # instead of hiding among the allowed warnings. Re-check it when GTK3 moves.
            - name: Audit Rust dependencies
              run: >
                  cargo audit --file src-tauri/Cargo.lock
                  --deny unsound
                  --ignore RUSTSEC-2024-0429

            - name: Install cargo-deny
              run: cargo install cargo-deny@0.20.2 --locked

            # cargo-audit covers advisories; cargo-deny adds the checks it does not: license
            # compliance (no copyleft license in an MIT-licensed app), dependency source trust
            # (crates.io only), and wildcard version requirements. Advisories are left to
            # cargo-audit above so the same gate is not run twice. Config: src-tauri/deny.toml.
            - name: Check licenses, sources and bans
              run: cargo deny --manifest-path src-tauri/Cargo.toml check licenses bans sources

    rust-coverage:
        name: "Rust coverage (floor: 60% lines)"
        # Pinned like the rust job; see its comment. Coverage is measured on this exact image, so a
        # silent OS-major jump could move the number for a reason unrelated to the tests.
        runs-on: ubuntu-26.04
        timeout-minutes: 30
        # A low backstop floor, not a tight per-PR ratchet. This job publishes the per-file
        # coverage table AND fails only if line coverage falls under a deliberately conservative
        # floor - a guard against a catastrophic regression (a new module landing with no tests, a
        # mass test deletion), never a percentage chase. The frontend has tight coverage floors
        # (vitest.config.ts, ~89% lines) and broad Stryker mutation testing; the Rust side - the
        # actual trust boundary - has `cargo test` (pass/fail) plus cargo-mutants scoped to the ten
        # security-critical modules in src-tauri/.cargo/mutants.toml's examine_globs (path
        # containment, the library-path guard, the yt-dlp host allow-list, external-binary
        # resolution, content-addressing/cleanup, the atomic filesystem primitives, the db_backup
        # core, the SSRF address guard, and the live-chat command). This adds the missing safety net
        # over the many other files under services/ and commands/ the mutation scope does not reach
        # (the yt-dlp download/metadata orchestration, the thumbnail downloader, the repositories,
        # the db_backup import/external/integrity submodules, and most command wrappers).
        #
        # The floor is set low on purpose to avoid the flaky-threshold trap this job previously
        # warned about: local readings sit around 73% lines / 77% regions, but coverage is measured
        # here on Linux and cannot be validated against a local (Windows) run, where `#[cfg]`-gated
        # platform code differs. A 60% floor therefore cannot go "permanently red" from that
        # measurement drift while still catching a large regression. Ratchet it up as readings on
        # this runner accumulate.
        env:
            CARGO_PROFILE_DEV_DEBUG: "0"
            CARGO_PROFILE_TEST_DEBUG: "0"
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Install Rust toolchain
              # Pin the exact toolchain (keep in sync with rust-toolchain.toml). llvm-tools-preview
              # supplies the llvm-profdata/llvm-cov binaries cargo-llvm-cov drives.
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-06-30)
              with:
                  toolchain: 1.96.0
                  components: llvm-tools-preview

            - name: Install Linux dependencies
              # No lld/RUSTFLAGS here, unlike the rust job: cargo-llvm-cov sets its own RUSTFLAGS
              # for instrumentation, and a second value in the environment would fight it. These apt
              # packages are intentionally unpinned for the same reason as the rust job above (exact
              # pins on a hosted image go stale and break the build; they are not shipped anyway).
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

            - name: Cache Rust build
              uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
              with:
                  # Instrumented builds cannot share the plain rust job's artifacts, so this keeps
                  # its own cache entry rather than thrashing that one.
                  workspaces: src-tauri
                  key: llvm-cov
                  cache-on-failure: "true"

            - name: Install cargo-llvm-cov
              # Pinned like every other tool install (ci.yml/release.yml/mutation.yml): an
              # unpinned `cargo install` builds whatever released today, so the measurement could
              # move because the tool changed rather than because the tests did.
              run: cargo install cargo-llvm-cov@0.8.7 --locked

            - name: Measure coverage and enforce the floor
              # `--fail-under-lines` prints the summary and then exits non-zero when line coverage
              # is under the floor. Capture that output (stdout+stderr) first and publish it to the
              # step summary regardless of pass/fail, so the real number stays visible even on a
              # failure, then re-raise cargo's status so a regression below the floor fails the job.
              run: |
                  status=0
                  cargo llvm-cov --manifest-path src-tauri/Cargo.toml --locked --summary-only \
                      --fail-under-lines 60 > coverage-summary.txt 2>&1 || status=$?
                  cat coverage-summary.txt
                  {
                      echo "### Rust coverage (floor: 60% lines)"
                      echo ""
                      echo '```'
                      cat coverage-summary.txt
                      echo '```'
                  } >> "$GITHUB_STEP_SUMMARY"
                  exit "$status"
