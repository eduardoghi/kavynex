name: ci

on:
    push:
        branches: [main]
    pull_request:

# CI only needs to read the repository; keep the token minimal regardless of the
# repository/organization default.
permissions:
    contents: read

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    frontend:
        name: Frontend
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            # No version input: the pnpm version comes from package.json's packageManager
            # field, so CI and local Corepack install the same pinned pnpm.
            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  # Pinned to the Node major @types/node targets (26), so the code is
                  # type-checked against the same runtime CI uses. Bump both together.
                  node-version: 26
                  cache: pnpm

            # Catch a version bumped in only some of package.json/tauri.conf.json/Cargo.toml
            # here, on every push/PR, instead of only at release time.
            - name: Verify version consistency
              run: node scripts/verify-release-version.js

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            # Fail only on high/critical advisories so a low-severity transitive
            # finding does not block all CI; RUSTSEC advisories are covered separately
            # by the cargo-audit job.
            - name: Audit production JS dependencies
              run: pnpm audit --prod --audit-level high

            # `--prod` above skips devDependencies (the build/test toolchain, which still
            # runs arbitrary code during install/build). Scan them too, but non-blocking:
            # a dev-only advisory should surface in the logs without gating every PR, since
            # it never ships in a release artifact.
            - name: Audit dev JS dependencies (non-blocking)
              continue-on-error: true
              run: pnpm audit --dev --audit-level high

            - name: Lint
              run: pnpm lint

            # Runs the full suite with coverage so the thresholds in vitest.config.ts are
            # enforced here (a large coverage regression fails CI). Mutation testing
            # (pnpm test:mutation) stays the higher-signal, manually-run quality gate.
            - name: Run tests
              run: pnpm test:coverage

            - name: Build frontend
              run: pnpm build

    rust:
        name: Rust (${{ matrix.platform }})
        strategy:
            fail-fast: false
            matrix:
                # macOS is included because the release ships macOS binaries; without it,
                # platform-specific bugs (path semantics, canonicalization) would only
                # surface at release time.
                platform: [ubuntu-22.04, windows-latest, macos-latest]
        runs-on: ${{ matrix.platform }}
        # Never let a job run toward the 6h default: a hang (like the ubuntu test that reaped a
        # killed child forever) fails in bounded time instead of appearing stuck for hours.
        timeout-minutes: 30
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Install Rust toolchain
              # Pin the exact toolchain (keep in sync with rust-toolchain.toml) instead of pulling
              # whatever "stable" is at build time. rust-toolchain.toml already forces this version
              # at cargo time; pinning the action too keeps the pre-installed compiler deterministic
              # and avoids downloading a moving "stable" toolchain the build never uses.
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-06-30)
              with:
                  toolchain: 1.96.0
                  components: rustfmt, clippy

            - name: Install Linux dependencies
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            - name: Cache Rust build
              uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
              with:
                  workspaces: src-tauri
                  # Persist the cache even when a job fails, so a run after a red build stays warm
                  # instead of recompiling the whole tree from scratch.
                  cache-on-failure: "true"

            - name: Check formatting
              run: cargo fmt --manifest-path src-tauri/Cargo.toml --all --check

            - name: Clippy
              run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --locked -- -D warnings

            - name: Run tests
              run: cargo test --manifest-path src-tauri/Cargo.toml --locked

            - name: Verify generated TS bindings are up to date
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  cargo test --manifest-path src-tauri/Cargo.toml --lib export_bindings
                  git diff --exit-code -- src/types/generated

    audit:
        name: Cargo audit and deny
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Install Rust toolchain
              # Pin the exact toolchain (keep in sync with rust-toolchain.toml) instead of a
              # moving "stable".
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-06-30)
              with:
                  toolchain: 1.96.0

            - name: Install cargo-audit
              run: cargo install cargo-audit --locked

            # RUSTSEC advisories are not covered by pnpm audit; this closes that gap for the
            # Rust dependency tree.
            - name: Audit Rust dependencies
              run: cargo audit --file src-tauri/Cargo.lock

            - name: Install cargo-deny
              run: cargo install cargo-deny --locked

            # cargo-audit covers advisories; cargo-deny adds the checks it does not: license
            # compliance (no copyleft license in an MIT-licensed app), dependency source trust
            # (crates.io only), and wildcard version requirements. Advisories are left to
            # cargo-audit above so the same gate is not run twice. Config: src-tauri/deny.toml.
            - name: Check licenses, sources and bans
              run: cargo deny --manifest-path src-tauri/Cargo.toml check licenses bans sources
