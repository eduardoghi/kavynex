name: release

on:
    workflow_dispatch:

jobs:
    # The dependency gates run in their own job, deliberately kept out of publish-tauri: they
    # `cargo install` third-party tools, which compiles and runs those crates' build scripts on
    # the runner, and publish-tauri is the runner that holds TAURI_SIGNING_PRIVATE_KEY. Building
    # them here instead keeps that code off the signing job entirely, and compiles each tool once
    # rather than once per matrix platform. publish-tauri `needs` this, so a failed gate still
    # blocks the release (the release is dispatched manually, so nothing guarantees the chosen
    # ref already passed ci.yml's identical checks).
    audit:
        name: Cargo audit and deny
        runs-on: ubuntu-latest
        # No secrets are needed to read the lockfile; this job never gets the signing key.
        permissions:
            contents: read
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Install Rust toolchain
              # Pin the exact toolchain (keep in sync with rust-toolchain.toml) instead of a
              # moving "stable".
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-06-30)
              with:
                  toolchain: 1.96.0

            # Pin the tool version (keep in sync with ci.yml): an unpinned `cargo install` builds
            # whatever the latest release happens to be at dispatch time, so the code executing on
            # the runner is not the code this repository last reviewed. Pinning costs nothing in
            # security freshness - cargo-audit downloads the RustSec advisory database at run
            # time, so a pinned tool still checks against today's advisories.
            - name: Install cargo-audit
              run: cargo install cargo-audit@0.22.2 --locked

            # RUSTSEC advisories are not covered by pnpm audit; this closes that gap for the Rust
            # dependency tree.
            - name: Audit Rust dependencies
              run: cargo audit --file src-tauri/Cargo.lock

            - name: Install cargo-deny
              run: cargo install cargo-deny@0.20.2 --locked

            # cargo-audit covers advisories; cargo-deny adds the checks it does not: license
            # compliance, dependency source trust (crates.io only), and wildcard requirements.
            # Config: src-tauri/deny.toml.
            - name: Check licenses, sources and bans
              run: cargo deny --manifest-path src-tauri/Cargo.toml check licenses bans sources

    publish-tauri:
        needs: audit
        permissions:
            contents: write
            # Build provenance attestation (actions/attest-build-provenance): id-token mints
            # the short-lived Sigstore OIDC identity for the keyless signature, attestations
            # uploads the resulting statement to the repository.
            id-token: write
            attestations: write

        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: macos-latest
                      args: --target aarch64-apple-darwin

                    - platform: macos-latest
                      args: --target x86_64-apple-darwin

                    - platform: ubuntu-22.04
                      args: ""

                    - platform: windows-latest
                      args: ""

        runs-on: ${{ matrix.platform }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  # Full history so the release notes can list the commits since the
                  # previous tag.
                  fetch-depth: 0

            # No version input: the pnpm version comes from package.json's packageManager
            # field, so CI and local Corepack install the same pinned pnpm.
            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  # Pinned to the Node major @types/node targets (26), so release builds run
                  # on the same runtime the code is type-checked against. Bump both together.
                  node-version: 26
                  cache: pnpm

            - name: Install Rust toolchain
              # Pin the exact toolchain (keep in sync with rust-toolchain.toml) instead of pulling
              # whatever "stable" is at build time, so released binaries are built with a
              # deterministic compiler that does not drift with upstream releases.
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-06-30)
              with:
                  toolchain: 1.96.0
                  components: rustfmt, clippy
                  targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

            - name: Install Linux dependencies
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            - name: Verify version consistency
              run: node scripts/verify-release-version.js

            - name: Verify the release tag does not exist yet
              shell: bash
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" > /dev/null 2>&1; then
                      echo "Tag v$VERSION already exists; bump the version before releasing." >&2
                      exit 1
                  fi

            - name: Build release notes
              id: release_notes
              shell: bash
              run: |
                  PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
                  # Randomize the heredoc delimiter so a commit subject that happened to contain the
                  # literal delimiter cannot terminate the block early and inject extra key=value
                  # pairs into GITHUB_OUTPUT. openssl is present on all GitHub-hosted runners.
                  DELIM="NOTES_EOF_$(openssl rand -hex 16)"
                  {
                      echo "body<<$DELIM"
                      echo "See the assets below to download and install this version."
                      if [ -n "$PREV_TAG" ]; then
                          echo ""
                          echo "## Changes since $PREV_TAG"
                          echo ""
                          git log --pretty="- %s" "$PREV_TAG..HEAD"
                      fi
                      echo "$DELIM"
                  } >> "$GITHUB_OUTPUT"

            - name: Install frontend dependencies
              run: pnpm install --frozen-lockfile

            # The release is dispatched manually, so an advisory published after the last CI
            # run on the chosen ref would otherwise ship unaudited. Re-run the same production
            # JS audit CI gates on, before building the binaries.
            - name: Audit production JS dependencies
              run: pnpm audit --prod --audit-level high

            # Mirror ci.yml's lint gate so a manually dispatched release cannot ship on a
            # commit with an ESLint violation that never went through CI. Platform-independent,
            # so it runs once on Ubuntu rather than on every matrix target.
            - name: Lint
              if: matrix.platform == 'ubuntu-22.04'
              run: pnpm lint

            - name: Run tests
              run: pnpm test -- --run

            # The release is dispatched manually, so nothing guarantees the chosen ref went
            # through ci.yml. Gate the published binaries on the same Rust checks CI runs.
            - name: Check Rust formatting
              run: cargo fmt --manifest-path src-tauri/Cargo.toml --all --check

            - name: Clippy
              run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --locked -- -D warnings

            - name: Run Rust tests
              run: cargo test --manifest-path src-tauri/Cargo.toml --locked

            # Mirror ci.yml: run the #[ignore]d yt-dlp process-kill tests on Windows and macOS
            # (they hang only on the ubuntu runner) so a release is also gated on the kill/timeout/
            # cancel path passing where it can run. Filtered by name to avoid the fixture-
            # regeneration test; short per-step timeout so a hang fails diagnosably.
            - name: Run ignored process-kill tests (Windows and macOS only)
              if: matrix.platform != 'ubuntu-22.04'
              timeout-minutes: 5
              run: cargo test --manifest-path src-tauri/Cargo.toml --locked run_and_capture_kills_the_child -- --ignored --test-threads=1

            # Mirror ci.yml's bindings-freshness gate so a release cannot ship with the
            # checked-in TypeScript bindings out of sync with the Rust types they are generated
            # from. Ubuntu only, matching ci.yml; the check is platform-independent.
            - name: Verify generated TS bindings are up to date
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  cargo test --manifest-path src-tauri/Cargo.toml --lib export_bindings
                  git diff --exit-code -- src/types/generated

            - name: Build frontend
              run: pnpm build

            - name: Build and publish Tauri app
              uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  tagName: v__VERSION__
                  releaseName: Kavynex v__VERSION__
                  releaseBody: ${{ steps.release_notes.outputs.body }}
                  releaseDraft: true
                  prerelease: false
                  args: ${{ matrix.args }}

            # Records a signed, keyless (Sigstore) statement that these exact installer bytes
            # were built by this workflow, from this commit. Independent of the minisign updater
            # signature: users can run `gh attestation verify <file> --repo eduardoghi/kavynex`
            # to confirm a downloaded installer's provenance. The `**` before `release` matches
            # both the plain (windows/linux) and target-triple (macOS) bundle layouts; only the
            # extensions produced on each runner match, which is enough for at least one subject.
            - name: Attest build provenance
              uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
              with:
                  subject-path: |
                      src-tauri/target/**/release/bundle/**/*.exe
                      src-tauri/target/**/release/bundle/**/*.msi
                      src-tauri/target/**/release/bundle/**/*.dmg
                      src-tauri/target/**/release/bundle/**/*.AppImage
                      src-tauri/target/**/release/bundle/**/*.deb
                      src-tauri/target/**/release/bundle/**/*.rpm

    checksums:
        name: Publish checksums
        needs: publish-tauri
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            # The updater artifacts are signed, but the installers downloaded manually
            # from the release page have no integrity reference without this file.
            - name: Generate and upload SHA256SUMS
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  mkdir assets
                  gh release download "v$VERSION" --dir assets
                  (cd assets && sha256sum * > ../SHA256SUMS.txt)
                  cat SHA256SUMS.txt
                  gh release upload "v$VERSION" SHA256SUMS.txt --clobber