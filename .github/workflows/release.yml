name: release

on:
    workflow_dispatch:

jobs:
    publish-tauri:
        permissions:
            contents: write

        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: macos-latest
                      args: --target aarch64-apple-darwin

                    - platform: macos-latest
                      args: --target x86_64-apple-darwin

                    - platform: ubuntu-22.04
                      args: ""

                    - platform: windows-latest
                      args: ""

        runs-on: ${{ matrix.platform }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Setup pnpm
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
              with:
                  version: 10

            - name: Setup Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: lts/*
                  cache: pnpm

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-06-30)
              with:
                  components: rustfmt, clippy
                  targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

            - name: Install Linux dependencies
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            - name: Install frontend dependencies
              run: pnpm install --frozen-lockfile

            - name: Run tests
              run: pnpm test -- --run

            # The release is dispatched manually, so nothing guarantees the chosen ref went
            # through ci.yml. Gate the published binaries on the same Rust checks CI runs.
            - name: Check Rust formatting
              run: cargo fmt --manifest-path src-tauri/Cargo.toml --all --check

            - name: Clippy
              run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --locked -- -D warnings

            - name: Run Rust tests
              run: cargo test --manifest-path src-tauri/Cargo.toml --locked

            - name: Build frontend
              run: pnpm build

            - name: Build and publish Tauri app
              uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  tagName: v__VERSION__
                  releaseName: Kavynex v__VERSION__
                  releaseBody: See the assets below to download and install this version.
                  releaseDraft: true
                  prerelease: false
                  args: ${{ matrix.args }}