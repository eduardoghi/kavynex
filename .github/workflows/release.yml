name: release

on:
    workflow_dispatch:

jobs:
    publish-tauri:
        permissions:
            contents: write
            # Build provenance attestation (actions/attest-build-provenance): id-token mints
            # the short-lived Sigstore OIDC identity for the keyless signature, attestations
            # uploads the resulting statement to the repository.
            id-token: write
            attestations: write

        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: macos-latest
                      args: --target aarch64-apple-darwin

                    - platform: macos-latest
                      args: --target x86_64-apple-darwin

                    - platform: ubuntu-22.04
                      args: ""

                    - platform: windows-latest
                      args: ""

        runs-on: ${{ matrix.platform }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  # Full history so the release notes can list the commits since the
                  # previous tag.
                  fetch-depth: 0

            # No version input: the pnpm version comes from package.json's packageManager
            # field, so CI and local Corepack install the same pinned pnpm.
            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  # Pinned to the Node major @types/node targets (26), so release builds run
                  # on the same runtime the code is type-checked against. Bump both together.
                  node-version: 26
                  cache: pnpm

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-06-30)
              with:
                  components: rustfmt, clippy
                  targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

            - name: Install Linux dependencies
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            - name: Verify version consistency
              run: node scripts/verify-release-version.js

            - name: Verify the release tag does not exist yet
              shell: bash
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" > /dev/null 2>&1; then
                      echo "Tag v$VERSION already exists; bump the version before releasing." >&2
                      exit 1
                  fi

            - name: Build release notes
              id: release_notes
              shell: bash
              run: |
                  PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
                  {
                      echo "body<<NOTES_EOF"
                      echo "See the assets below to download and install this version."
                      if [ -n "$PREV_TAG" ]; then
                          echo ""
                          echo "## Changes since $PREV_TAG"
                          echo ""
                          git log --pretty="- %s" "$PREV_TAG..HEAD"
                      fi
                      echo "NOTES_EOF"
                  } >> "$GITHUB_OUTPUT"

            - name: Install frontend dependencies
              run: pnpm install --frozen-lockfile

            - name: Run tests
              run: pnpm test -- --run

            # The release is dispatched manually, so nothing guarantees the chosen ref went
            # through ci.yml. Gate the published binaries on the same Rust checks CI runs.
            - name: Check Rust formatting
              run: cargo fmt --manifest-path src-tauri/Cargo.toml --all --check

            - name: Clippy
              run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --locked -- -D warnings

            - name: Run Rust tests
              run: cargo test --manifest-path src-tauri/Cargo.toml --locked

            - name: Build frontend
              run: pnpm build

            - name: Build and publish Tauri app
              uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  tagName: v__VERSION__
                  releaseName: Kavynex v__VERSION__
                  releaseBody: ${{ steps.release_notes.outputs.body }}
                  releaseDraft: true
                  prerelease: false
                  args: ${{ matrix.args }}

            # Records a signed, keyless (Sigstore) statement that these exact installer bytes
            # were built by this workflow, from this commit. Independent of the minisign updater
            # signature: users can run `gh attestation verify <file> --repo eduardoghi/kavynex`
            # to confirm a downloaded installer's provenance. The `**` before `release` matches
            # both the plain (windows/linux) and target-triple (macOS) bundle layouts; only the
            # extensions produced on each runner match, which is enough for at least one subject.
            - name: Attest build provenance
              uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
              with:
                  subject-path: |
                      src-tauri/target/**/release/bundle/**/*.exe
                      src-tauri/target/**/release/bundle/**/*.msi
                      src-tauri/target/**/release/bundle/**/*.dmg
                      src-tauri/target/**/release/bundle/**/*.AppImage
                      src-tauri/target/**/release/bundle/**/*.deb
                      src-tauri/target/**/release/bundle/**/*.rpm

    checksums:
        name: Publish checksums
        needs: publish-tauri
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            # The updater artifacts are signed, but the installers downloaded manually
            # from the release page have no integrity reference without this file.
            - name: Generate and upload SHA256SUMS
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  mkdir assets
                  gh release download "v$VERSION" --dir assets
                  (cd assets && sha256sum * > ../SHA256SUMS.txt)
                  cat SHA256SUMS.txt
                  gh release upload "v$VERSION" SHA256SUMS.txt --clobber