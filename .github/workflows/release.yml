name: release

on:
    workflow_dispatch:

# Least-privilege default for the whole workflow, matching ci.yml/mutation.yml. The jobs that need
# more escalate in their own `permissions:` block (publish-tauri: contents/id-token/attestations
# write; checksums: contents write); the audit job stays read-only. Declaring the read-only default
# here means a job added later without its own block inherits read-only rather than the
# repository/organization default, so a new job cannot silently gain write access.
permissions:
    contents: read

# Only one release may be in flight at a time. Without this, two manual dispatches (the classic
# "I don't think the first one started") both pass the "tag does not exist yet" check below,
# both build and sign on four runners, and both upload assets to the same draft - leaving the
# checksums job to hash whatever mix of the two happened to land. That is a corrupted release,
# not just wasted minutes.
#
# `cancel-in-progress: false` is the point: cancelling a run that is already signing or
# uploading is worse than making the second one wait. The queued run starts only after the
# first finishes, by which time the tag exists and its own guard fails it with a clear message.
#
# Unlike ci.yml/mutation.yml this group is deliberately not keyed on `github.ref`: what is
# contended here is not the ref but the release itself (one tag, one draft, one set of assets),
# which is repository-global. Two dispatches from different refs carrying the same package.json
# version would still collide on the same tag, and a per-ref group would happily let them.
concurrency:
    group: release
    cancel-in-progress: false

jobs:
    # The dependency gates run in their own job, deliberately kept out of publish-tauri: they
    # `cargo install` third-party tools, which compiles and runs those crates' build scripts on
    # the runner, and publish-tauri is the runner that holds TAURI_SIGNING_PRIVATE_KEY. Building
    # them here instead keeps that code off the signing job entirely, and compiles each tool once
    # rather than once per matrix platform. publish-tauri `needs` this, so a failed gate still
    # blocks the release (the release is dispatched manually, so nothing guarantees the chosen
    # ref already passed ci.yml's identical checks).
    audit:
        name: Cargo audit and deny
        # Pinned like the build matrix below; `-latest` can silently jump an OS major mid-release.
        runs-on: ubuntu-22.04
        timeout-minutes: 60
        # No secrets are needed to read the lockfile; this job never gets the signing key.
        permissions:
            contents: read
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Install Rust toolchain
              # Pin the exact toolchain (keep in sync with rust-toolchain.toml) instead of a
              # moving "stable".
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-06-30)
              with:
                  toolchain: 1.96.0

            # Pin the tool version (keep in sync with ci.yml): an unpinned `cargo install` builds
            # whatever the latest release happens to be at dispatch time, so the code executing on
            # the runner is not the code this repository last reviewed. Pinning costs nothing in
            # security freshness - cargo-audit downloads the RustSec advisory database at run
            # time, so a pinned tool still checks against today's advisories.
            - name: Install cargo-audit
              run: cargo install cargo-audit@0.22.2 --locked

            # RUSTSEC advisories are not covered by the JS advisory check; this closes that gap
            # for the Rust dependency tree. Same flags as ci.yml's audit job, which is where the
            # reasoning for each one is written down - they have to stay in step, since the release
            # is dispatched by hand and cannot assume CI ever ran against the chosen commit.
            - name: Audit Rust dependencies
              run: >
                  cargo audit --file src-tauri/Cargo.lock
                  --deny unsound
                  --ignore RUSTSEC-2024-0429

            - name: Install cargo-deny
              run: cargo install cargo-deny@0.20.2 --locked

            # cargo-audit covers advisories; cargo-deny adds the checks it does not: license
            # compliance, dependency source trust (crates.io only), and wildcard requirements.
            # Config: src-tauri/deny.toml.
            - name: Check licenses, sources and bans
              run: cargo deny --manifest-path src-tauri/Cargo.toml check licenses bans sources

    publish-tauri:
        needs: audit
        permissions:
            contents: write
            # Build provenance attestation (actions/attest-build-provenance): id-token mints
            # the short-lived Sigstore OIDC identity for the keyless signature, attestations
            # uploads the resulting statement to the repository.
            id-token: write
            attestations: write

        strategy:
            fail-fast: false
            matrix:
                # Pinned images, like ubuntu-22.04 already was, rather than the `-latest` aliases.
                # `-latest` moves to a new major OS whenever GitHub decides, which is not a
                # theoretical worry here: the 2026-07-14 run resolved `macos-latest` to
                # macos-26-arm64 while the runner-images README still documented it as macOS 15.
                # The Rust toolchain and Node are pinned to the version, so leaving the OS itself
                # free is the one thing that could still change what a release is built on between
                # two otherwise identical runs. These are the images those runs actually used, so
                # this pins current behavior rather than changing it; bump them deliberately.
                include:
                    - platform: macos-26
                      args: --target aarch64-apple-darwin

                    - platform: macos-26
                      args: --target x86_64-apple-darwin

                    - platform: ubuntu-22.04
                      args: ""

                    - platform: windows-2025
                      args: ""

        runs-on: ${{ matrix.platform }}
        # This job holds the repository-wide `release` concurrency lock (cancel-in-progress is
        # deliberately false), so a hang here blocks every later release dispatch until GitHub's
        # 6h default expires. Bound it well above the slowest matrix leg instead.
        timeout-minutes: 90

        steps:
            # This is the job that holds TAURI_SIGNING_PRIVATE_KEY and `contents: write`, so it is
            # where a stray dispatch must be stopped. `workflow_dispatch` lets the runner pick any
            # ref, and nothing else pins it to main - so without this a build from a throwaway or
            # unreviewed branch would be compiled, signed with the real minisign key, and published
            # as a draft. Fail before checkout, before any secret is in scope. `github.ref` is
            # `refs/heads/<branch>` for a branch dispatch.
            # `github.ref` goes through `env:` rather than being interpolated into the script:
            # `${{ }}` is substituted before the shell ever parses the line, and a branch name may
            # contain shell metacharacters, so interpolating it directly would let a branch named
            # `$(...)` run its own code in a job that holds `id-token: write`. It takes push access
            # to reach, which is not much of an attacker, but this is the one step where a hostile
            # ref is the expected input.
            - name: Refuse to release from a non-main ref
              if: github.ref != 'refs/heads/main'
              env:
                  DISPATCHED_REF: ${{ github.ref }}
              run: |
                  echo "::error::Release must be dispatched from main, got $DISPATCHED_REF." >&2
                  exit 1

            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  # Full history so the release notes can list the commits since the
                  # previous tag.
                  fetch-depth: 0

            # No version input: the pnpm version comes from package.json's packageManager
            # field, so CI and local Corepack install the same pinned pnpm.
            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  # Pinned to the Node major @types/node targets (26), so release builds run
                  # on the same runtime the code is type-checked against. Bump both together.
                  node-version: 26
                  cache: pnpm

            - name: Install Rust toolchain
              # Pin the exact toolchain (keep in sync with rust-toolchain.toml) instead of pulling
              # whatever "stable" is at build time, so released binaries are built with a
              # deterministic compiler that does not drift with upstream releases.
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-06-30)
              with:
                  toolchain: 1.96.0
                  components: rustfmt, clippy
                  targets: ${{ matrix.platform == 'macos-26' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

            - name: Install Linux dependencies
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            - name: Verify version consistency
              run: node scripts/verify-release-version.js

            - name: Verify the release tag does not exist yet
              shell: bash
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" > /dev/null 2>&1; then
                      echo "Tag v$VERSION already exists; bump the version before releasing." >&2
                      exit 1
                  fi

            - name: Build release notes
              id: release_notes
              shell: bash
              run: |
                  PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
                  # Randomize the heredoc delimiter so a commit subject that happened to contain the
                  # literal delimiter cannot terminate the block early and inject extra key=value
                  # pairs into GITHUB_OUTPUT. openssl is present on all GitHub-hosted runners.
                  DELIM="NOTES_EOF_$(openssl rand -hex 16)"
                  {
                      echo "body<<$DELIM"
                      echo "See the assets below to download and install this version."
                      if [ -n "$PREV_TAG" ]; then
                          echo ""
                          echo "## Changes since $PREV_TAG"
                          echo ""
                          git log --pretty="- %s" "$PREV_TAG..HEAD"
                      fi
                      echo "$DELIM"
                  } >> "$GITHUB_OUTPUT"

            - name: Install frontend dependencies
              run: pnpm install --frozen-lockfile

            # The release is dispatched manually, so an advisory published after the last CI
            # run on the chosen ref would otherwise ship unaudited. Re-run the same production
            # JS audit CI gates on, before building the binaries. Platform-independent (it reads
            # the lockfile and queries osv.dev), so it runs once on Ubuntu rather than on all four
            # matrix targets - four concurrent runs would only multiply the chance of a transient
            # osv.dev failure taking a build leg down with it.
            - name: Audit production JS dependencies
              if: matrix.platform == 'ubuntu-22.04'
              run: pnpm run advisories:check

            # Mirror ci.yml's license gate for the same reason as every other check duplicated
            # here: the release is dispatched manually, so nothing guarantees the chosen ref ever
            # went through CI. Platform-independent, so it runs once on Ubuntu.
            - name: Check production JS licenses
              if: matrix.platform == 'ubuntu-22.04'
              run: pnpm licenses:check

            # Mirror ci.yml's lint gate so a manually dispatched release cannot ship on a
            # commit with an ESLint violation that never went through CI. Platform-independent,
            # so it runs once on Ubuntu rather than on every matrix target.
            - name: Lint
              if: matrix.platform == 'ubuntu-22.04'
              run: pnpm lint

            # `test:coverage` rather than a plain run, mirroring ci.yml: the coverage floors live
            # in vitest.config.ts and are only enforced when coverage is collected, so running
            # without it silently drops that gate from the release path - the one path that cannot
            # assume ci.yml ever ran against this ref. Kept on every matrix target rather than
            # Ubuntu-only like Lint: the suite is jsdom-based but not fully platform-independent
            # (date formatting varies with the runner's ICU - see the U+202F handling in
            # media-utils.test.ts), so each platform is worth exercising.
            - name: Run tests
              run: pnpm test:coverage

            # The release is dispatched manually, so nothing guarantees the chosen ref went
            # through ci.yml. Gate the published binaries on the same Rust checks CI runs.
            - name: Check Rust formatting
              run: cargo fmt --manifest-path src-tauri/Cargo.toml --all --check

            - name: Clippy
              run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --locked -- -D warnings

            - name: Run Rust tests
              run: cargo test --manifest-path src-tauri/Cargo.toml --locked

            # Mirror ci.yml: run the #[ignore]d yt-dlp process-kill tests on Windows and macOS
            # (they hang only on the ubuntu runner) so a release is also gated on the kill/timeout/
            # cancel path passing where it can run. Filtered by name to avoid the fixture-
            # regeneration test; short per-step timeout so a hang fails diagnosably.
            - name: Run ignored process-kill tests (Windows and macOS only)
              if: matrix.platform != 'ubuntu-22.04'
              timeout-minutes: 5
              run: cargo test --manifest-path src-tauri/Cargo.toml --locked run_and_capture_kills_the_child -- --ignored --test-threads=1

            # Mirror ci.yml's bindings-freshness gate so a release cannot ship with the
            # checked-in TypeScript bindings out of sync with the Rust types they are generated
            # from. Ubuntu only, matching ci.yml; the check is platform-independent.
            - name: Verify generated TS bindings are up to date
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  cargo test --manifest-path src-tauri/Cargo.toml --lib export_bindings
                  git diff --exit-code -- src/types/generated

            - name: Build frontend
              run: pnpm build

            - name: Build and publish Tauri app
              uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  tagName: v__VERSION__
                  releaseName: Kavynex v__VERSION__
                  releaseBody: ${{ steps.release_notes.outputs.body }}
                  releaseDraft: true
                  prerelease: false
                  args: ${{ matrix.args }}

            # Records a signed, keyless (Sigstore) statement that these exact installer bytes
            # were built by this workflow, from this commit. Independent of the minisign updater
            # signature: users can run `gh attestation verify <file> --repo eduardoghi/kavynex`
            # to confirm a downloaded installer's provenance. The `**` before `release` matches
            # both the plain (windows/linux) and target-triple (macOS) bundle layouts; only the
            # extensions produced on each runner match, which is enough for at least one subject.
            - name: Attest build provenance
              uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
              with:
                  subject-path: |
                      src-tauri/target/**/release/bundle/**/*.exe
                      src-tauri/target/**/release/bundle/**/*.msi
                      src-tauri/target/**/release/bundle/**/*.dmg
                      src-tauri/target/**/release/bundle/**/*.AppImage
                      src-tauri/target/**/release/bundle/**/*.deb
                      src-tauri/target/**/release/bundle/**/*.rpm

    checksums:
        name: Publish checksums
        needs: publish-tauri
        # Pinned like the build matrix; `-latest` can silently jump an OS major mid-release.
        runs-on: ubuntu-22.04
        timeout-minutes: 60
        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            # The updater artifacts are signed, but the installers downloaded manually
            # from the release page have no integrity reference without this file.
            - name: Generate and upload SHA256SUMS
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  mkdir assets
                  gh release download "v$VERSION" --dir assets
                  (cd assets && sha256sum * > ../SHA256SUMS.txt)
                  cat SHA256SUMS.txt
                  gh release upload "v$VERSION" SHA256SUMS.txt --clobber

            # The four build legs upload to the draft independently (fail-fast is off), so a leg
            # that dies leaves a draft holding the other three - complete-looking, and one manual
            # "Publish" away from shipping a release with, say, no Windows installer. This job is
            # skipped entirely when a leg fails, so the only thing standing between that draft and
            # publication is the maintainer noticing the run is red. Name the expected set instead,
            # and fail loudly listing what is missing.
            #
            # Runs after the upload above so SHA256SUMS.txt is part of what gets checked.
            - name: Verify the draft has every expected asset
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  ASSETS=$(gh release view "v$VERSION" --json assets --jq '.assets[].name')
                  echo "$ASSETS"

                  # One entry per artifact the matrix is expected to produce, as a glob. The
                  # `.sig` files are the updater's; note the two .dmg files deliberately have
                  # none - tauri signs the macOS updater bundle (.app.tar.gz), not the disk image.
                  MISSING=""
                  for pattern in \
                      "kavynex_${VERSION}_x64-setup.exe" \
                      "kavynex_${VERSION}_x64-setup.exe.sig" \
                      "kavynex_${VERSION}_x64_en-US.msi" \
                      "kavynex_${VERSION}_x64_en-US.msi.sig" \
                      "kavynex_${VERSION}_aarch64.dmg" \
                      "kavynex_${VERSION}_x64.dmg" \
                      "kavynex_aarch64.app.tar.gz" \
                      "kavynex_aarch64.app.tar.gz.sig" \
                      "kavynex_x64.app.tar.gz" \
                      "kavynex_x64.app.tar.gz.sig" \
                      "kavynex_${VERSION}_amd64.AppImage" \
                      "kavynex_${VERSION}_amd64.AppImage.sig" \
                      "kavynex_${VERSION}_amd64.deb" \
                      "kavynex_${VERSION}_amd64.deb.sig" \
                      "kavynex-${VERSION}-1.x86_64.rpm" \
                      "kavynex-${VERSION}-1.x86_64.rpm.sig" \
                      "latest.json" \
                      "SHA256SUMS.txt" \
                  ; do
                      if ! printf '%s\n' "$ASSETS" | grep -qxF "$pattern"; then
                          MISSING="$MISSING  $pattern\n"
                      fi
                  done

                  if [ -n "$MISSING" ]; then
                      echo "::error::The draft release v$VERSION is incomplete. Do not publish it."
                      printf "Missing assets:\n$MISSING"
                      exit 1
                  fi

                  echo "The draft release v$VERSION has every expected asset."

            # The check above proves latest.json is *present*, which is not the same as it being
            # complete. Every build leg merges its own entries into that one file on the release, so
            # a leg that uploaded its installer but lost the merge (a transient API error, two legs
            # racing) leaves a latest.json that parses fine and simply never offers an update to one
            # platform. Nothing else would notice: the file is there, the installers are there, and
            # only users on the missing platform would silently stop getting updates.
            #
            # Reads the copy the checksums step already downloaded, and checks the four keys the
            # updater actually looks up - tauri also emits `-app`/`-msi`/`-nsis`/`-appimage`/`-deb`/
            # `-rpm` variants, but the client resolves the bare `<os>-<arch>` one.
            - name: Verify latest.json offers every platform
              run: node scripts/verify-latest-json.js assets/latest.json