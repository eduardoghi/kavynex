name: mutation

on:
    # Mutation testing is the higher-signal quality gate but too slow to run on every PR, so it
    # runs on a weekly schedule (Mondays 06:00 UTC) and on demand instead of gating each push.
    schedule:
        - cron: "0 6 * * 1"
    workflow_dispatch:

# The run only needs to read the repository.
permissions:
    contents: read

concurrency:
    group: mutation-${{ github.ref }}
    cancel-in-progress: true

jobs:
    mutation:
        name: Mutation testing
        # Pinned rather than `ubuntu-latest`, matching ci.yml's rust job: `-latest` can silently jump
        # an OS major, which would move a mutation score for a reason unrelated to the tests.
        runs-on: ubuntu-26.04
        # Generous timeout: a full mutation run is long, and this is a weekly scheduled run rather
        # than a per-PR gate, so a longer wall-clock is fine. A too-tight timeout would also report
        # as a failure indistinguishable from a real mutation-score regression.
        timeout-minutes: 120
        steps:
            - name: Checkout repository
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

            # No version input: the pnpm version comes from package.json's packageManager
            # field, so CI and local Corepack install the same pinned pnpm.
            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

            - name: Setup Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version: 26.5.0
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            # Stryker exits non-zero when the mutation score falls below thresholds.break in
            # stryker.config.json, so a real regression in test strength fails this scheduled run.
            - name: Run mutation testing
              run: pnpm test:mutation

    rust-mutation:
        name: Rust mutation testing
        # Pinned like the job above and ci.yml's rust job; see those comments.
        runs-on: ubuntu-26.04
        # Generous timeout for the same reason as the frontend job above: cargo-mutants rebuilds and
        # tests the tree once per mutant, so a full run is long, and this weekly scheduled run can
        # afford the wall-clock.
        timeout-minutes: 120
        # Trim debuginfo like ci.yml's Rust job: cargo-mutants rebuilds the tree once per mutant, so
        # keeping the per-build cost down matters more here than anywhere else.
        env:
            CARGO_PROFILE_DEV_DEBUG: "0"
            CARGO_PROFILE_TEST_DEBUG: "0"
        steps:
            - name: Checkout repository
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

            - name: Install Rust toolchain
              # Pin the exact toolchain (keep in sync with rust-toolchain.toml), matching ci.yml.
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-06-30)
              with:
                  toolchain: 1.96.0

            # These apt packages are intentionally unpinned, like ci.yml/release.yml: exact pins on
            # a hosted image go stale as the archive drops old versions and break the build for a
            # reason unrelated to this project; they are dev headers, not shipped in any bundle.
            - name: Install Linux dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf lld
                  # Link with lld instead of the slow default ld.bfd, mirroring ci.yml's Rust job.
                  echo "RUSTFLAGS=-C link-arg=-fuse-ld=lld" >> "$GITHUB_ENV"

            - name: Cache Rust build
              uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
              with:
                  workspaces: src-tauri
                  cache-on-failure: "true"

            # Pin the tool version, like ci.yml/release.yml do for cargo-audit and cargo-deny: an
            # unpinned `cargo install` builds whatever the latest release happens to be on the day
            # the schedule fires, so a mutation score could move because the tool changed rather
            # than because the tests did.
            - name: Install cargo-mutants
              run: cargo install cargo-mutants@27.1.0 --locked

            # Mutates only the security-critical modules (see src-tauri/.cargo/mutants.toml's
            # examine_globs): path containment, the library-path guard, the yt-dlp host allow-list,
            # and external-binary resolution. cargo-mutants exits 2 when a mutant survives - a logic
            # change its tests did not catch - which fails this scheduled run, the mutation-level
            # counterpart to Stryker for the frontend. The generous per-mutant timeout keeps a
            # mutation-induced infinite loop from being misreported instead of caught.
            #
            # `--in-place` is required, not a preference: cargo-mutants' default copies only the
            # `src-tauri` package into a scratch dir, but the youtube-handle parity test
            # (utils/validation.rs) `include_str!`s `../shared/youtube-handle-cases.json` from the
            # repo root - a fixture deliberately shared with the TypeScript side. The copy leaves
            # that sibling behind, so the unmutated baseline build fails there ("cargo build failed
            # in an unmutated tree") before a single mutant runs. Testing in the real tree keeps the
            # `../shared` path resolvable. The CI checkout is disposable, so the in-place caveats
            # (no parallel copies; a killed run leaves the tree mutated) do not apply here.
            #
            # No explicit `--locked` here, unlike every other cargo invocation in this repo: it is
            # already covered by `additional_cargo_args = ["--locked"]` in
            # src-tauri/.cargo/mutants.toml, which cargo-mutants applies to every cargo check/test
            # invocation it runs. Verified locally (cargo-mutants 27.1.0, the version pinned
            # above): passing `--cargo-arg=--locked` here as well fails the run with "the argument
            # '--locked' cannot be used multiple times", confirming it is already applied.
            - name: Run Rust mutation testing
              run: cargo mutants --manifest-path src-tauri/Cargo.toml --in-place --no-shuffle --timeout 300

    # GitHub emails the maintainer when a scheduled run fails, but that is an easily-missed inbox
    # signal - mirrors scheduled-audit.yml's alert-on-failure job for the same reason. Open (or
    # comment on) a tracking issue so a failing mutation run is visible in the repository itself.
    # Runs only when a job above actually failed, and only on the schedule/dispatch this workflow
    # already runs on.
    alert-on-failure:
        name: Open an issue on failure
        needs: [mutation, rust-mutation]
        if: failure()
        runs-on: ubuntu-26.04
        timeout-minutes: 10
        permissions:
            issues: write
        steps:
            - name: Open or update the tracking issue
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
              run: |
                  TITLE="Scheduled mutation testing failed"
                  BODY="The weekly scheduled mutation testing run failed - a mutant survived, a test regressed, or the run itself errored. Review the run and shore up the affected tests: $RUN_URL"
                  EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
                  if [ -n "$EXISTING" ]; then
                      gh issue comment "$EXISTING" --body "$BODY"
                  else
                      gh issue create --title "$TITLE" --body "$BODY"
                  fi
