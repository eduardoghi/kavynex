name: scheduled-audit

# The dependency audits in ci.yml only run on push/pull_request, so a new advisory published
# against an already-vendored dependency goes unnoticed until the next commit lands - which, on a
# quiet week for a solo project, can be a long time. This runs the same JS (osv.dev) and Rust
# (cargo-audit/cargo-deny) gates on a weekly schedule against the committed lockfiles, so a freshly
# disclosed advisory surfaces on its own rather than waiting for the next push. Also dispatchable by
# hand. The gates and their pins are kept identical to ci.yml; a red run here means the same thing.
on:
    schedule:
        # Thursdays 07:00 UTC, offset from mutation.yml's Monday run so the two never contend.
        - cron: "0 7 * * 4"
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: scheduled-audit
    cancel-in-progress: false

jobs:
    js-advisories:
        name: JS advisories (osv.dev)
        # Pinned rather than `-latest` for the same reason as every other job in the repo: `-latest`
        # silently moves to a new OS major (the 2026-07-14 run already saw it for macOS).
        runs-on: ubuntu-26.04
        timeout-minutes: 30
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            # No version input: the pnpm version comes from package.json's packageManager field, so
            # this and local Corepack install the same pinned pnpm.
            - name: Setup pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

            - name: Setup Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  # Kept in sync with ci.yml: the Node major @types/node targets (26).
                  node-version: 26.5.0
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            # Same gate as ci.yml: fail on a high/critical advisory in the production tree, queried
            # against osv.dev (see scripts/check-js-advisories.js).
            - name: Audit production JS dependencies
              run: pnpm run advisories:check

            # Also re-check production JS licenses weekly, mirroring ci.yml. ci.yml only runs this on
            # push/PR, so a license change in a re-published version of an already-approved package
            # (rare, but possible) would otherwise go unnoticed until the next commit lands.
            - name: Check production JS licenses
              run: pnpm licenses:check

            # Dev tree too, non-blocking, exactly as in ci.yml: a dev-only advisory should surface
            # in the logs without gating, since it never ships in a release artifact.
            - name: Audit dev JS dependencies (non-blocking)
              continue-on-error: true
              run: pnpm run advisories:check --dev

    rust-advisories:
        name: Cargo audit and deny
        runs-on: ubuntu-26.04
        timeout-minutes: 30
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Install Rust toolchain
              # Pinned to rust-toolchain.toml's version, like ci.yml.
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-06-30)
              with:
                  toolchain: 1.96.0

            # Pin the tool version (keep in sync with ci.yml/release.yml). cargo-audit still checks
            # against today's RustSec advisory database, which it downloads at run time, so pinning
            # the tool costs nothing in freshness while keeping the run reproducible.
            - name: Install cargo-audit
              run: cargo install cargo-audit@0.22.2 --locked

            # Same flags as ci.yml's audit job; see its comments for why each ignore/deny is set the
            # way it is (the GTK3/unic-* unmaintained tree, the yanked spin via sqlx, RUSTSEC-2024-0429).
            - name: Audit Rust dependencies
              run: >
                  cargo audit --file src-tauri/Cargo.lock
                  --deny unsound
                  --ignore RUSTSEC-2024-0429

            - name: Install cargo-deny
              run: cargo install cargo-deny@0.20.2 --locked

            - name: Check licenses, sources and bans
              run: cargo deny --manifest-path src-tauri/Cargo.toml check licenses bans sources

    # GitHub emails the maintainer when a scheduled run fails, but that is an easily-missed inbox
    # signal - the header of this file frames the workflow's whole job as "surfacing" a new
    # advisory, and an email alone barely does that. Open (or comment on) a tracking issue so a
    # failing audit is visible in the repository itself. Runs only when a gate above actually
    # failed, and only on the schedule/dispatch this workflow already runs on.
    alert-on-failure:
        name: Open an issue on failure
        needs: [js-advisories, rust-advisories]
        if: failure()
        runs-on: ubuntu-26.04
        timeout-minutes: 10
        permissions:
            issues: write
        steps:
            - name: Open or update the tracking issue
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
              run: |
                  TITLE="Scheduled dependency audit failed"
                  BODY="The weekly scheduled dependency audit failed against the committed lockfiles - a JS advisory/license or a Rust cargo-audit/cargo-deny gate is red. Review the run and update or pin the affected dependency: $RUN_URL"
                  EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
                  if [ -n "$EXISTING" ]; then
                      gh issue comment "$EXISTING" --body "$BODY"
                  else
                      gh issue create --title "$TITLE" --body "$BODY"
                  fi
