# cargo-mutants configuration.
#
# Mutation testing for the security-critical Rust modules: cargo-mutants rewrites their logic
# (an inverted `starts_with`, a dropped `!`, an off-by-one, a swapped return) and fails if the
# existing tests still pass. That proves whether those tests actually kill logic mutants rather
# than merely covering the lines - line coverage on these files is already high, but coverage
# alone does not prove a bypass would be caught.
#
# Scoped to the modules whose regression cost is highest - path containment, the library-path
# guard, the yt-dlp host allow-list, and external-binary resolution - so the run stays inside the
# CI time budget. Widen `examine_globs` as the tests elsewhere earn the extra runtime; this is the
# Rust counterpart to Stryker (stryker.config.json), which only mutates the frontend.
#
# Run locally with:
#     cargo mutants --manifest-path src-tauri/Cargo.toml
# CI runs it on a weekly schedule (.github/workflows/mutation.yml); a surviving mutant makes
# cargo-mutants exit 2, which fails that run.

# Test *only* these files (globs are relative to this package root, src-tauri/).
#
# `src/services/filesystem.rs` - the atomic copy/replace primitives (whose job is to refuse to
# overwrite differing content and to restore the original when a replace fails) and the
# file-matching helpers. ADDED below after triaging its survivors.
#     Measured 2026-07-17 (`--no-config --file`): 121 mutants, 34 missed. Re-measured 2026-07-18 after
#     the symlink-cycle/temp-cleanup changes: 131 mutants, 43 missed. The matching helpers
#     (`find_latest_matching_file`, `find_unique_matching_file`, `find_best_matching_file`,
#     `clean_matching_files_in_dir`) held most of the killable ones - the existing preference test
#     picked the preferred file only because it was also the newest, so a flipped preference
#     comparison slipped through; the rest were prefix-named-subdirectory and non-directory cases the
#     filters guard but no test exercised. Those are now covered by tests. The remainder are excluded
#     below with a reason each: boundary functions (EXDEV detection, directory fsync), cfg-split
#     bodies, error-recovery branches a unit test cannot force, and equivalent mutants (a temp
#     filename the following rename discards, a guard that short-circuits to the same value, a `!=`
#     that only picks which line gets logged).
#
# Worth widening next, once measured and triaged the same way:
#   - `src/services/db_backup.rs` - backup/restore/export/import, the most destructive operations in
#     the app. Not yet measured; do the `--no-config --file src/services/db_backup/mod.rs` pass,
#     sort the survivors into kill/exclude, and only then add the glob so the weekly run stays green.
#   - `src/services/library_media.rs` and `src/services/library_cleanup.rs` - content-addressing
#     and the reference-count-before-unlink decision. ADDED below after a measured pass
#     (2026-07-18, cargo-mutants 27.1.0, `--in-place --no-config --file <each>`): 111 mutants, 94
#     unviable, 14 caught, and 3 initially missed - all three in `execute_plan`'s two early-return
#     branches (the empty-plan and library-unavailable reports), whose field population the tests
#     never asserted because that function needs a live `AppHandle`. Those branches were extracted
#     into the pure `report_for_nothing_deletable` / `report_for_unavailable_library` and covered,
#     so the glob goes in clean rather than red. (`--in-place` is needed to run cargo-mutants here
#     at all: the copy mode leaves the repo-root `../shared` parity fixture behind - see
#     mutation.yml.)
examine_globs = [
    "src/utils/path.rs",
    "src/services/library_guard.rs",
    "src/services/yt_dlp_url.rs",
    "src/services/binaries.rs",
    "src/services/library_media.rs",
    "src/services/library_cleanup.rs",
    "src/services/filesystem.rs",
]

# Build and test against the committed Cargo.lock, matching every other cargo invocation in the
# project (ci.yml / release.yml all pass --locked) so a mutation run never silently re-resolves
# dependencies.
additional_cargo_args = ["--locked"]

# Skip mutants a unit test cannot deterministically kill, so the gate stays meaningful (a red run
# means a real gap) instead of perpetually red on things no test can pin. What stays in scope is
# the actual security logic: `sanitize_relative_path_strict` / `ensure_managed_library_relative_path`
# and the containment helpers, `is_allowed_youtube_url` / `is_allowed_youtube_host`, and
# `paths_refer_to_same_location` (the canonical-path comparison behind the library guard). Every
# exclusion below is a function whose behavior is a filesystem/process/env boundary, a
# cfg-split body cargo-mutants cannot evaluate, or an equivalent mutant.
exclude_re = [
    # Boundary functions in binaries.rs: they read the process `PATH`, spawn `--version` health
    # checks, or resolve app directories from the `AppHandle`, none of which a unit test can pin
    # to a deterministic result on an arbitrary machine. `resolve_from_path` also matches
    # `resolve_from_path_var`, which is split into `#[cfg(windows)]` / `#[cfg(not(windows))]`
    # bodies: cargo-mutants does not evaluate cfg, so on any single platform the *other* body is
    # reported as an unkillable "missed" mutant (so it can never be green cross-platform). Its
    # actual no-CWD guarantee stays covered directly by the binaries.rs unit tests
    # (`resolve_from_path_var_only_searches_listed_directories` and the PATHEXT test).
    'is_executable_file',
    'resolve_from_path',
    'resolve_binary_from_candidates',
    'resolve_yt_dlp_binary',
    'resolve_ffmpeg_binary',
    'run_command_and_capture_first_line',
    'validate_yt_dlp_binary',
    'validate_ffmpeg_binary',
    'resolve_external_tools_status',
    # AppHandle/pool-bound guard entrypoints: they need the shared SQLite pool and settings row,
    # which do not exist under the unit-test harness (an AppHandle command cannot run there - the
    # pure comparison they delegate to, paths_refer_to_same_location, stays in scope and tested).
    'configured_library_dir',
    'ensure_configured_library_path',
    'verify_library_path_then_blocking',
    # Equivalent mutant: with `&&`, one empty input still returns false, because canonicalize("")
    # always errors and an empty string never equals a non-empty one, so the fallback compare
    # yields the same false. No input distinguishes it, so no test can kill it.
    'replace \|\| with && in paths_refer_to_same_location',
    # filesystem.rs boundary/cfg/equivalent survivors (triaged 2026-07-18; see the note above).
    # EXDEV detection is cfg-split (unix errno 18 / windows 17) and needs a real cross-device rename
    # to exercise; the name also matches the match-guard mutants in move_or_copy_file that call it.
    'is_cross_device_error',
    # Directory-entry fsync: cfg-split (unix File::sync_all / windows FlushFileBuffers), best-effort,
    # and its only effect - flushing the dir entry - is invisible to any functional test.
    'fsync_parent_dir',
    # Equivalent: with `&&`, a missing or non-file path still returns Ok(false), because the next
    # guard (or the hash of a non-file) yields the same result; the directory-vs-file case it defends
    # has no caller. Covers both the exists() and is_file() guards.
    'replace \|\| with && in file_paths_have_same_content',
    # Equivalent: only changes the internal temp filename, which the following rename discards.
    'delete ! in build_temp_destination_path',
    # The failed-rename recovery branch in copy_file_atomic, reachable only when the temp->dest
    # rename itself fails - which a unit test cannot force deterministically.
    'replace && with \|\| in copy_file_atomic',
    # The backup-vanished race branch in replace_file_safely: needs the destination to disappear
    # between the exists check and the rename, which no deterministic test can arrange.
    'error.kind\(\) == ErrorKind::NotFound.* in replace_file_safely',
    'replace == with != in replace_file_safely',
    # Equivalent: this `!=` gates only an eprintln diagnostic during migration - no observable change.
    'replace != with == in migrate_directory_contents',
    # The symlink-cycle test is cfg(unix) (creating a symlink on Windows needs privilege), so this
    # mutant survives only on a non-unix measurement; the ubuntu CI gate's unix test kills it. Its
    # `-> true` counterpart stays in scope (a plain copy test catches it on every platform).
    'replace dir_entry_is_symlink -> bool with false',
    # Equivalent: the ext guard in alternative_destination_path only differs from `true` when the
    # extension is an empty string, which Path::extension never yields (a trailing-dot name has no
    # extension). The `with false`/`delete !` variants are killed by the migration extension test.
    'replace match guard !ext.trim\(\).is_empty\(\) with true in alternative_destination_path',
]
